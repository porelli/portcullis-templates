services:
  docs:
    image: squidfunk/mkdocs-material:latest
    volumes:
      - ./docs:/docs/docs:ro
      - ./templates/docs/mkdocs.yml:/docs/mkdocs.yml:ro
    networks:
      - default
      - portcullis-proxy
    labels:
      traefik.enable: "true"
      traefik.http.routers.docs.rule: Host(`docs.${PORTCULLIS_DOMAIN:-portcullis.local}`)
      traefik.http.routers.docs.entrypoints: websecure
      traefik.http.routers.docs.tls.options: public@file
      traefik.http.routers.docs.middlewares: security-headers@file
      traefik.http.services.docs.loadbalancer.server.port: "8000"
    restart: unless-stopped

networks:
  portcullis-proxy:
    external: true
