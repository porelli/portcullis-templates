services:
  nextcloud:
    image: nextcloud:stable-apache
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:-changeme}
      NEXTCLOUD_TRUSTED_DOMAINS: cloud.${PORTCULLIS_DOMAIN:-portcullis.local}
      OVERWRITEPROTOCOL: https
      OVERWRITEHOST: cloud.${PORTCULLIS_DOMAIN:-portcullis.local}
    volumes:
      - nextcloud-data:/var/www/html
    networks:
      - default
      - portcullis-proxy
    labels:
      traefik.enable: "true"
      traefik.http.routers.nextcloud.rule: Host(`cloud.${PORTCULLIS_DOMAIN:-portcullis.local}`)
      traefik.http.routers.nextcloud.entrypoints: websecure
      traefik.http.routers.nextcloud.tls.options: authaware@file
      traefik.http.routers.nextcloud.middlewares: client-headers@file,portcullis-auth@docker,portcullis-groups@docker,security-headers@file
      traefik.http.services.nextcloud.loadbalancer.server.port: "80"
    restart: unless-stopped

volumes:
  nextcloud-data:
    name: portcullis_nextcloud-data

networks:
  portcullis-proxy:
    external: true
