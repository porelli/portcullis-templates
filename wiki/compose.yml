services:
  wiki:
    image: requarks/wiki:2
    environment:
      DB_TYPE: postgres
      DB_HOST: wiki-db
      DB_PORT: "5432"
      DB_USER: wiki
      DB_PASS: ${WIKI_DB_PASSWORD:-changeme}
      DB_NAME: wiki
    depends_on:
      - wiki-db
    networks:
      - default
      - portcullis-proxy
    labels:
      traefik.enable: "true"
      traefik.http.routers.wiki.rule: Host(`wiki.${PORTCULLIS_DOMAIN:-portcullis.local}`)
      traefik.http.routers.wiki.entrypoints: websecure
      traefik.http.routers.wiki.tls.options: authaware@file
      traefik.http.routers.wiki.middlewares: client-headers@file,portcullis-auth@docker,portcullis-groups@docker,security-headers@file
      traefik.http.services.wiki.loadbalancer.server.port: "3000"
    restart: unless-stopped

  wiki-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wiki
      POSTGRES_USER: wiki
      POSTGRES_PASSWORD: ${WIKI_DB_PASSWORD:-changeme}
    volumes:
      - wiki-db-data:/var/lib/postgresql/data

volumes:
  wiki-db-data:
    name: portcullis_wiki-db-data

networks:
  portcullis-proxy:
    external: true
